spring.application.name=eagle-entertainment

# ── Database (H2 file-based, persists between restarts) ──────────────────────
spring.datasource.url=jdbc:h2:file:./eagledb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
# SECURITY: Disable H2 console in production (enable only for local dev)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# ── File upload limits ────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=EagleEntertainmentSecretKey2024ArjunPriya1718SuperSecretJWTKeyForTokenGeneration
jwt.expiration=86400000

# ── File storage ──────────────────────────────────────────────────────────────
file.upload-dir=./uploads

# ── Server port ───────────────────────────────────────────────────────────────
server.port=8080

# ── Backend public base URL ───────────────────────────────────────────────────
# LOCAL DEV:   leave as http://localhost:8080
# PRODUCTION:  set environment variable APP_BASE_URL on Render to your Render URL
#              e.g. https://vv-entertainments-website-1.onrender.com
app.base-url=${APP_BASE_URL:http://localhost:8080}
