spring.application.name=eagle-entertainment

# H2 Database
spring.datasource.url=jdbc:h2:file:./eagledb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# JWT
jwt.secret=EagleEntertainmentSecretKey2024ArjunPriya1718SuperSecretJWTKeyForTokenGeneration
jwt.expiration=86400000

# File storage path
file.upload-dir=./uploads

server.port=8080

# Public base URL of this backend (used to build absolute image URLs returned to the frontend).
# Override this in Render's Environment Variables:
#   app.base-url=https://vv-entertainments-website-1.onrender.com
app.base-url=http://localhost:8080


